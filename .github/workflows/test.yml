
name: github-app-auth-action

on:
  workflow_dispatch:
    inputs:
      action-tag:
        description: "Tag for the action"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  github-app-auth-action-main:
    name: GitHub App Auth (main)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Decode App Credentials
        id: decode
        run: |
          DECODED=$(echo "${{ secrets.APP_CREDS_BASE64 }}" | base64 -d)
          echo "creds<<EOF" >> $GITHUB_OUTPUT
          echo "$DECODED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get GitHub App Token
        id: auth
        continue-on-error: true
        uses: step-security/github-app-auth-action@release
        with:
          creds: ${{ steps.decode.outputs.creds }}
