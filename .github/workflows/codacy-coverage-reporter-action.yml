name: codacy-coverage-reporter-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codacy-coverage-reporter-action-main:
    name: Codacy Coverage Reporter (main)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create coverage report
        run: |
          mkdir -p coverage
          cat > coverage/coverage.xml << 'EOF'
          <?xml version="1.0" ?>
          <coverage branch-rate="0" branches-covered="0" branches-valid="0" complexity="0" line-rate="0.85" lines-covered="85" lines-valid="100" timestamp="1620000000" version="5.5">
            <packages>
              <package branch-rate="0" complexity="0" line-rate="0.85" name="src">
                <classes>
                  <class branch-rate="0" complexity="0" filename="src/main.py" line-rate="0.85" name="main">
                    <lines>
                      <line hits="1" number="1"/>
                    </lines>
                  </class>
                </classes>
              </package>
            </packages>
          </coverage>
          EOF
  
      - name: Upload Coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@master
        with:
          project-token: "49CVZHbGyYRvAKw08VIQ"
          coverage-reports: "coverage/coverage.xml"
        env:
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: Raj-StepSecurity
          CODACY_PROJECT_NAME: Playground-Test

      - name: Upload Coverage to Codacy
        uses: step-security/codacy-coverage-reporter-action@main
        with:
          project-token: "49CVZHbGyYRvAKw08VIQ"
          coverage-reports: "coverage/coverage.xml"
        env:
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: Raj-StepSecurity
          CODACY_PROJECT_NAME: Playground-Test
